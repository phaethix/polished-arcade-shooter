name: Bug report
description: Report something that is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: The player ship stops responding after wave 3...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Run `npm run dev`
        2. Start a new game
        3. Reach wave 3
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: Chrome 138 on macOS, Safari on iPhone 15
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or release
      placeholder: main @ abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console errors or screenshots
      description: Paste any relevant console output or attach screenshots.
    validations:
      required: false

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Inject the deployed co-op host into the production build.
      # Set VITE_PARTYKIT_HOST as a *repository variable*
      # (Settings → Secrets and variables → Actions → Variables), e.g.
      #   sky-blaster-coop.<subdomain>.workers.dev
      # obtained from `npx wrangler deploy`. Without it the client falls back
      # to localhost:8787 and co-op connections fail in production.
      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          VITE_PARTYKIT_HOST: ${{ vars.VITE_PARTYKIT_HOST }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-coop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Deploy the co-op room server to Cloudflare Workers.
      # Requires repository secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
      # PARTYKIT_HOST is the *client origin* (the GitHub Pages site) allowed to
      # open WebSocket handshakes — NOT the worker URL. The worker URL goes to
      # the client via the VITE_PARTYKIT_HOST build variable instead.
      - name: Deploy co-op room server
        run: npx wrangler deploy --var PARTYKIT_HOST:https://phaethix.github.io
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
